<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Generador de QR • Logos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <link rel="stylesheet" href="libraries/css/styles.css">
    <link rel="icon" href="svg\chicken-svgrepo-com.svg" type="image/svg+xml">
    <script>tailwind.config = { theme: { extend: {} } };</script>
</head>

<body class="bg-zinc-50">
    <div class="max-w-[1200px] mx-auto px-6 py-8">
        <div class="flex items-end justify-between mb-6">
            <div>
                <div class="flex items-center gap-x-3">
                    <div class="w-10 h-10 bg-black rounded-2xl flex items-center justify-center">
                        <i class="fa-solid fa-qrcode text-white text-2xl"></i>
                    </div>
                    <div>
                        <h1 class="font-display text-4xl tracking-tighter font-semibold text-zinc-900">Mini QR</h1>
                        <p class="text-zinc-500 -mt-1">Marcos + Patrones + Logos</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 xl:grid-cols-12 gap-6">

            <!-- CONTROLS -->
            <div class="xl:col-span-5 space-y-6">

                <!-- Content -->
                <div class="bg-white border border-zinc-200 rounded-3xl p-6 shadow-sm">
                    <div class="mb-5">
                        <div class="section-title text-zinc-700 mb-1.5">Contenido del QR</div>
                        <input id="qr-content" type="text" value="https://google.com" placeholder="Ingresa URL o texto"
                            class="w-full px-4 py-3 bg-white border border-zinc-300 focus:border-black rounded-2xl text-base outline-none">
                    </div>
                    <div id="frame-text-section" class="hidden">
                        <div class="section-title text-zinc-700 mb-1.5">Texto del marco</div>
                        <input id="frame-text-input" type="text" value="SCAN ME" maxlength="20"
                            placeholder="Ej: SCAN ME, VISÍTANOS, ¡ÚNETE!"
                            class="w-full px-4 py-3 bg-white border border-zinc-300 focus:border-black rounded-2xl text-base outline-none">
                        <div class="text-[11px] text-zinc-400 mt-1.5 pl-1">Texto que aparece en el marco del QR</div>
                    </div>
                </div>

                <!-- Logo Section -->
                <div class="bg-white border border-zinc-200 rounded-3xl p-6 shadow-sm">
                    <div class="flex items-center justify-between mb-3">
                        <div class="section-title text-zinc-700">Logo central</div>
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" id="use-logo" class="sr-only peer">
                            <div
                                class="w-8 h-4.5 bg-zinc-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[1px] after:left-[1px] after:bg-white after:border after:rounded-full after:h-3.5 after:w-3.5 after:transition-all peer-checked:bg-black">
                            </div>
                        </label>
                    </div>

                    <!-- Custom Upload -->
                    <div id="logo-upload-section" class="mb-4">
                        <label class="flex cursor-pointer">
                            <div
                                class="flex-1 border border-dashed border-zinc-300 hover:border-zinc-400 rounded-2xl px-4 py-2.5 text-center text-sm">
                                <i class="fa-solid fa-upload text-zinc-400 mr-1"></i>
                                <span class="text-xs font-medium text-zinc-600">Subir logo personalizado</span>
                                <input type="file" id="logo-file" accept="image/*" class="hidden">
                            </div>
                        </label>
                        <div id="logo-preview"
                            class="hidden mt-2 flex items-center gap-2 text-xs bg-zinc-50 border px-3 py-1 rounded-2xl w-fit">
                            <img id="logo-thumb" class="w-5 h-5 object-contain rounded" />
                            <span class="text-emerald-600 font-medium">Logo listo</span>
                            <button onclick="removeLogo()" class="ml-2 text-red-500">
                                <i class="fa-solid fa-times"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Predefined Logos -->
                    <div>
                        <div class="text-xs text-zinc-500 mb-2">Logos predeterminados</div>
                        <div class="flex gap-1 mb-2 overflow-x-auto pb-1" id="logo-tabs"></div>
                        <div id="predefined-logos-grid"
                            class="grid grid-cols-5 gap-2 max-h-[140px] overflow-y-auto p-1 bg-zinc-50 rounded-2xl">
                        </div>
                    </div>
                </div>

                <!-- Marcos + Pattern + Corners + Colors -->
                <div class="bg-white border border-zinc-200 rounded-3xl p-6 shadow-sm space-y-6">

                    <div>
                        <div class="section-title text-zinc-700 mb-3">Marcos</div>
                        <div id="frame-grid" class="grid grid-cols-3 gap-2.5"></div>
                    </div>

                    <div class="grid grid-cols-2 gap-6">
                        <div>
                            <div class="section-title text-zinc-700 mb-2.5">Patrón</div>
                            <div id="pattern-grid" class="grid grid-cols-3 gap-2"></div>
                        </div>
                        <div>
                            <div class="section-title text-zinc-700 mb-2.5">Esquinas</div>
                            <div id="corners-grid" class="grid grid-cols-3 gap-2"></div>
                        </div>
                    </div>

                    <div>
                        <div class="section-title text-zinc-700 mb-3">Colores</div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <div class="text-xs text-zinc-500 mb-1.5">Color del patrón</div>
                                <div class="flex items-center gap-3">
                                    <div id="dot-color-swatch" class="color-swatch border-zinc-300"
                                        style="background-color: #111827;"
                                        onclick="document.getElementById('dot-color-input').click()"></div>
                                    <input type="color" id="dot-color-input" value="#111827" class="hidden">
                                    <div id="dot-color-hex" class="text-xs font-mono text-zinc-500">#111827</div>
                                </div>
                            </div>
                            <div>
                                <div class="text-xs text-zinc-500 mb-1.5">Color de fondo</div>
                                <div class="flex items-center gap-3">
                                    <div id="bg-color-swatch" class="color-swatch border-zinc-300"
                                        style="background-color: #ffffff;"
                                        onclick="document.getElementById('bg-color-input').click()"></div>
                                    <input type="color" id="bg-color-input" value="#ffffff" class="hidden">
                                    <div id="bg-color-hex" class="text-xs font-mono text-zinc-500">#ffffff</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="flex gap-3">
                    <button onclick="updatePreview()"
                        class="flex-1 bg-zinc-900 hover:bg-black text-white font-semibold py-3 rounded-2xl text-sm flex items-center justify-center gap-x-2">
                        <i class="fa-solid fa-sync-alt"></i>
                        <span>Actualizar</span>
                    </button>
                    <button onclick="downloadQR()"
                        class="flex-1 border border-zinc-900 hover:bg-zinc-900 hover:text-white font-semibold py-3 rounded-2xl text-sm flex items-center justify-center gap-x-2">
                        <i class="fa-solid fa-download"></i>
                        <span>Descargar</span>
                    </button>
                </div>
            </div>

            <!-- PREVIEW -->
            <div class="xl:col-span-7">
                <div class="bg-white border border-zinc-200 rounded-3xl p-6 shadow-sm">
                    <div class="flex items-center justify-between mb-4 px-1">
                        <div class="section-title">Vista previa</div>
                        <div id="current-frame-name" class="text-xs px-3 py-1 bg-zinc-100 rounded-2xl text-zinc-600">
                        </div>
                    </div>

                    <div id="preview-wrapper"
                        class="bg-zinc-100 rounded-3xl p-8 flex items-center justify-center min-h-[480px]">
                        <div id="preview" class="qr-preview relative mx-auto">
                            <div id="css-frame-container" class="hidden">
                                <div id="frame-inner" class="flex items-center justify-center">
                                    <div id="qr-host"></div>
                                </div>
                                <div id="frame-extra" class="absolute inset-0 pointer-events-none"></div>
                            </div>
                            <div id="svg-frame-container" class="svg-frame-container hidden"></div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>
    <script type="module" src="libraries\js\main.js"></script>
</body>

</html>
