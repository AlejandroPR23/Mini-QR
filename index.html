<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Generador de QR • Logos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <link rel="stylesheet" href="libraries/css/styles.css">
    <link rel="icon" type="image/png" href="svg\chicken-svgrepo-com.svg">
</head>

<body class="bg-zinc-50">
    <div class="max-w-[1200px] mx-auto px-6 py-8">
        <div class="flex items-end justify-between mb-6">
            <div>
                <div class="flex items-center gap-x-3">
                    <div class="w-10 h-10 bg-black rounded-2xl flex items-center justify-center">
                        <i class="fa-solid fa-qrcode text-white text-2xl"></i>
                    </div>
                    <div>
                        <h1 class="font-display text-4xl tracking-tighter font-semibold text-zinc-900">Mini QR</h1>
                        <p class="text-zinc-500 -mt-1">Marcos + Patrones + Logos</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 xl:grid-cols-12 gap-6">

            <!-- CONTROLS -->
            <div class="xl:col-span-5 space-y-6">

                <!-- Content -->
                <div class="bg-white border border-zinc-200 rounded-3xl p-6 shadow-sm">
                    <div class="mb-5">
                        <div class="section-title text-zinc-700 mb-1.5">Contenido del QR</div>
                        <input id="qr-content" type="text" value="https://google.com" placeholder="Ingresa URL o texto"
                            class="w-full px-4 py-3 bg-white border border-zinc-300 focus:border-black rounded-2xl text-base outline-none">
                    </div>
                    <div id="frame-text-section" class="hidden">
                        <div class="section-title text-zinc-700 mb-1.5">Texto del marco</div>
                        <input id="frame-text-input" type="text" value="SCAN ME" maxlength="20"
                            placeholder="Ej: SCAN ME, VISÍTANOS, ¡ÚNETE!"
                            class="w-full px-4 py-3 bg-white border border-zinc-300 focus:border-black rounded-2xl text-base outline-none">
                        <div class="text-[11px] text-zinc-400 mt-1.5 pl-1">Texto que aparece en el marco del QR</div>
                    </div>
                </div>

                <!-- Logo Section -->
                <div class="bg-white border border-zinc-200 rounded-3xl p-6 shadow-sm">
                    <div class="flex items-center justify-between mb-3">
                        <div class="section-title text-zinc-700">Logo central</div>
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" id="use-logo" class="sr-only peer">
                            <div
                                class="w-8 h-4.5 bg-zinc-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[1px] after:left-[1px] after:bg-white after:border after:rounded-full after:h-3.5 after:w-3.5 after:transition-all peer-checked:bg-black">
                            </div>
                        </label>
                    </div>

                    <!-- Custom Upload -->
                    <div id="logo-upload-section" class="mb-4">
                        <label class="flex cursor-pointer">
                            <div
                                class="flex-1 border border-dashed border-zinc-300 hover:border-zinc-400 rounded-2xl px-4 py-2.5 text-center text-sm">
                                <i class="fa-solid fa-upload text-zinc-400 mr-1"></i>
                                <span class="text-xs font-medium text-zinc-600">Subir logo personalizado</span>
                                <input type="file" id="logo-file" accept="image/*" class="hidden">
                            </div>
                        </label>
                        <div id="logo-preview"
                            class="hidden mt-2 flex items-center gap-2 text-xs bg-zinc-50 border px-3 py-1 rounded-2xl w-fit">
                            <img id="logo-thumb" class="w-5 h-5 object-contain rounded" />
                            <span class="text-emerald-600 font-medium">Logo listo</span>
                            <button onclick="removeLogo()" class="ml-2 text-red-500"><i
                                    class="fa-solid fa-times"></i></button>
                        </div>
                    </div>

                    <!-- Predefined Logos -->
                    <div>
                        <div class="text-xs text-zinc-500 mb-2">Logos predeterminados</div>

                        <!-- Tabs -->
                        <div class="flex gap-1 mb-2 overflow-x-auto pb-1" id="logo-tabs"></div>

                        <!-- Logos Grid -->
                        <div id="predefined-logos-grid"
                            class="grid grid-cols-5 gap-2 max-h-[140px] overflow-y-auto p-1 bg-zinc-50 rounded-2xl">
                        </div>
                    </div>
                </div>

                <!-- Marcos + Pattern + Corners + Colors -->
                <div class="bg-white border border-zinc-200 rounded-3xl p-6 shadow-sm space-y-6">

                    <div>
                        <div class="section-title text-zinc-700 mb-3">Marcos</div>
                        <div id="frame-grid" class="grid grid-cols-3 gap-2.5"></div>
                    </div>

                    <div class="grid grid-cols-2 gap-6">
                        <div>
                            <div class="section-title text-zinc-700 mb-2.5">Patrón</div>
                            <div id="pattern-grid" class="grid grid-cols-3 gap-2"></div>
                        </div>
                        <div>
                            <div class="section-title text-zinc-700 mb-2.5">Esquinas</div>
                            <div id="corners-grid" class="grid grid-cols-3 gap-2"></div>
                        </div>
                    </div>

                    <div>
                        <div class="section-title text-zinc-700 mb-3">Colores</div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <div class="text-xs text-zinc-500 mb-1.5">Color del patrón</div>
                                <div class="flex items-center gap-3">
                                    <div id="dot-color-swatch" class="color-swatch border-zinc-300"
                                        style="background-color: #111827;"
                                        onclick="document.getElementById('dot-color-input').click()"></div>
                                    <input type="color" id="dot-color-input" value="#111827" class="hidden">
                                    <div id="dot-color-hex" class="text-xs font-mono text-zinc-500">#111827</div>
                                </div>
                            </div>
                            <div>
                                <div class="text-xs text-zinc-500 mb-1.5">Color de fondo</div>
                                <div class="flex items-center gap-3">
                                    <div id="bg-color-swatch" class="color-swatch border-zinc-300"
                                        style="background-color: #ffffff;"
                                        onclick="document.getElementById('bg-color-input').click()"></div>
                                    <input type="color" id="bg-color-input" value="#ffffff" class="hidden">
                                    <div id="bg-color-hex" class="text-xs font-mono text-zinc-500">#ffffff</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="flex gap-3">
                    <button onclick="updatePreview(true)"
                        class="flex-1 bg-zinc-900 hover:bg-black text-white font-semibold py-3 rounded-2xl text-sm flex items-center justify-center gap-x-2">
                        <i class="fa-solid fa-sync-alt"></i>
                        <span>Actualizar</span>
                    </button>
                    <button onclick="downloadQR()"
                        class="flex-1 border border-zinc-900 hover:bg-zinc-900 hover:text-white font-semibold py-3 rounded-2xl text-sm flex items-center justify-center gap-x-2">
                        <i class="fa-solid fa-download"></i>
                        <span>Descargar</span>
                    </button>
                </div>
            </div>

            <!-- PREVIEW -->
            <div class="xl:col-span-7">
                <div class="bg-white border border-zinc-200 rounded-3xl p-6 shadow-sm">
                    <div class="flex items-center justify-between mb-4 px-1">
                        <div class="section-title">Vista previa</div>
                        <div id="current-frame-name" class="text-xs px-3 py-1 bg-zinc-100 rounded-2xl text-zinc-600">
                        </div>
                    </div>

                    <div id="preview-wrapper"
                        class="bg-zinc-100 rounded-3xl p-8 flex items-center justify-center min-h-[480px]">
                        <div id="preview" class="qr-preview relative mx-auto">
                            <div id="css-frame-container" class="hidden">
                                <div id="frame-inner" class="flex items-center justify-center">
                                    <div id="qr-host"></div>
                                </div>
                                <div id="frame-extra" class="absolute inset-0 pointer-events-none"></div>
                            </div>
                            <div id="svg-frame-container" class="svg-frame-container hidden"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function initializeTailwind() {
            tailwind.config = { theme: { extend: {} } };
        }

        let patternStyles = [];
        let cornerStyles  = [];
        let logoCategories = [];
        let predefinedLogos = [];
        let frames = [];

        let currentPattern = 'rounded';
        let currentCorners = 'rounded';
        let currentDotColor = '#111827';
        let currentBgColor = '#ffffff';
        let logoDataUrl = null;
        let selectedPredefinedLogo = null;
        let currentFrameId = 'phone-scan-me';
        let qrCodeInstance = null;

        async function loadData() {
            const [patternsRes, cornersRes, logosRes, framesRes] = await Promise.all([
                fetch('data/patterns.json'),
                fetch('data/corners.json'),
                fetch('data/logos.json'),
                fetch('data/frames.json'),
            ]);

            const patternsData = await patternsRes.json();
            const cornersData  = await cornersRes.json();
            const logosData    = await logosRes.json();
            const framesData   = await framesRes.json();

            patternStyles  = patternsData.patterns;
            cornerStyles   = cornersData.corners;
            logoCategories = logosData.categories;

            predefinedLogos = logosData.logos.map(logo => ({
                ...logo,
                icon: logo.imageUrl,
            }));

            frames = framesData.frames.map(f => {
                if (f.svgTemplate) {
                    const txt = document.createElement('textarea');
                    txt.innerHTML = f.svgTemplate;
                    f.svgTemplate = txt.value;
                }
                return f;
            });
        }


        function createFrameCards() {
            const grid = document.getElementById('frame-grid');
            grid.innerHTML = '';
            frames.forEach(frame => {
                const card = document.createElement('div');
                const isActive = frame.id === currentFrameId;
                card.className = `frame-card border ${isActive ? 'border-zinc-900' : 'border-zinc-200'} bg-white rounded-2xl p-2 cursor-pointer text-center`;
                let preview = frame.type === 'svg'
                    ? `<div class="h-12 flex items-center justify-center scale-[0.6]">${frame.svgTemplate}</div>`
                    : `<div class="h-12 ${frame.outerClass} flex items-center justify-center"><div class="${frame.innerClass} w-7 h-7 flex items-center justify-center"><div class="mini-qr text-[10px]"><i class="fa-solid fa-qrcode"></i></div></div></div>`;
                card.innerHTML = `<div class="text-xs font-medium mb-1">${frame.name}</div>${preview}`;
                card.onclick = () => {
                    document.querySelectorAll('#frame-grid .frame-card').forEach(c => c.classList.remove('border-zinc-900'));
                    card.classList.add('border-zinc-900');
                    currentFrameId = frame.id;
                    updateFrameTextVisibility();
                    updatePreview(true);
                };
                grid.appendChild(card);
            });
        }

        function createPatternCards() {
            const grid = document.getElementById('pattern-grid');
            grid.innerHTML = '';
            patternStyles.forEach(style => {
                const card = document.createElement('div');
                const isActive = currentPattern === style.id;
                card.className = `style-card p-2 rounded-xl cursor-pointer text-center ${isActive ? 'active bg-zinc-50' : 'bg-white'}`;
                card.innerHTML = `<div class="flex justify-center mb-1"><div class="w-9 h-9 border border-zinc-300 flex items-center justify-center" style="background:#fff;"><div style="width:22px;height:22px;background:#111827;border-radius:${style.type.includes('rounded') || style.type === 'dots' ? '50%' : '2px'}"></div></div></div><div class="text-[10px] font-medium">${style.name}</div>`;
                card.onclick = () => {
                    currentPattern = style.id;
                    document.querySelectorAll('#pattern-grid .style-card').forEach(c => c.classList.remove('active', 'bg-zinc-50'));
                    card.classList.add('active', 'bg-zinc-50');
                    updatePreview(true);
                };
                grid.appendChild(card);
            });
        }

        function createCornerCards() {
            const grid = document.getElementById('corners-grid');
            grid.innerHTML = '';
            cornerStyles.forEach(style => {
                const card = document.createElement('div');
                const isActive = currentCorners === style.id;
                card.className = `style-card p-2 rounded-xl cursor-pointer text-center ${isActive ? 'active bg-zinc-50' : 'bg-white'}`;
                card.innerHTML = `<div class="flex justify-center mb-1"><div class="w-9 h-9 border border-zinc-300 flex items-center justify-center relative" style="background:#fff;"><div style="width:18px;height:18px;border:2.5px solid #111827;border-radius:${style.square === 'dot' ? '50%' : '2px'}"></div><div style="position:absolute;width:6px;height:6px;background:#111827;border-radius:${style.dot === 'dot' ? '50%' : '1px'}"></div></div></div><div class="text-[10px] font-medium">${style.name}</div>`;
                card.onclick = () => {
                    currentCorners = style.id;
                    document.querySelectorAll('#corners-grid .style-card').forEach(c => c.classList.remove('active', 'bg-zinc-50'));
                    card.classList.add('active', 'bg-zinc-50');
                    updatePreview(true);
                };
                grid.appendChild(card);
            });
        }

        function createLogoTabs() {
            const container = document.getElementById('logo-tabs');
            container.innerHTML = '';
            logoCategories.forEach(cat => {
                const tab = document.createElement('div');
                tab.className = `logo-tab px-3 py-1 text-xs cursor-pointer border ${cat === 'Todos' ? 'active bg-zinc-900 text-white border-zinc-900' : 'bg-white border-zinc-200 text-zinc-600'}`;
                tab.textContent = cat;
                tab.onclick = () => {
                    document.querySelectorAll('#logo-tabs .logo-tab').forEach(t => t.classList.remove('active', 'bg-zinc-900', 'text-white'));
                    tab.classList.add('active', 'bg-zinc-900', 'text-white');
                    renderPredefinedLogos(cat);
                };
                container.appendChild(tab);
            });
        }

        function drawInitialsOnCanvas(canvas, ctx, logo) {
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(cx, cy, cx - 5, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = logo.color || '#111827';
            ctx.beginPath();
            ctx.arc(cx, cy - 8, Math.floor(cx * 0.62), 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#ffffff';
            ctx.font = `bold ${Math.floor(cx * 0.42)}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(logo.name.substring(0, 2).toUpperCase(), cx, cy - 3);
        }

        function finalizeLogoSelection(logo, card, dataUrl) {
            logoDataUrl = dataUrl;
            selectedPredefinedLogo = logo.id;
            document.querySelectorAll('#predefined-logos-grid .logo-card').forEach(c => c.classList.remove('active', 'border-zinc-900'));
            card.classList.add('active', 'border-zinc-900');
            document.getElementById('use-logo').checked = true;
            document.getElementById('logo-preview').classList.remove('hidden');
            document.getElementById('logo-thumb').src = dataUrl;
            updatePreview(true);
        }

        function renderPredefinedLogos(filterCategory = 'Todos') {
            const grid = document.getElementById('predefined-logos-grid');
            grid.innerHTML = '';

            const filtered = filterCategory === 'Todos'
                ? predefinedLogos
                : predefinedLogos.filter(l => l.category === filterCategory);

            filtered.forEach(logo => {
                const card = document.createElement('div');
                card.className = `logo-card p-2 rounded-xl cursor-pointer flex flex-col items-center justify-center border border-zinc-200 hover:border-zinc-300 bg-white aspect-square`;

                const iconSrc = logo.icon || logo.imageUrl;
                const isImageUrl = iconSrc && (
                    iconSrc.startsWith('http://') ||
                    iconSrc.startsWith('https://') ||
                    iconSrc.startsWith('/') ||
                    iconSrc.startsWith('svg/')
                );

                const iconEl = isImageUrl
                    ? `<img src="${iconSrc}" class="w-8 h-8 mb-1 object-contain" alt="${logo.name}">`
                    : `<span class="text-2xl mb-1 leading-none font-bold" style="color:${logo.color || '#111827'}">${logo.name.substring(0, 2).toUpperCase()}</span>`;

                card.innerHTML = `${iconEl}<div class="text-[9px] text-center text-zinc-600 leading-none">${logo.name}</div>`;

                card.onclick = async () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 240;
                    canvas.height = 240;
                    const ctx = canvas.getContext('2d');

                    ctx.fillStyle = '#ffffff';
                    ctx.beginPath();
                    ctx.arc(120, 120, 115, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.strokeStyle = '#f3f4f6';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(120, 120, 115, 0, Math.PI * 2);
                    ctx.stroke();

                    const imageSource = logo.imageUrl || iconSrc;

                    if (!imageSource) {
                        drawInitialsOnCanvas(canvas, ctx, logo);
                        finalizeLogoSelection(logo, card, canvas.toDataURL('image/png'));
                        return;
                    }

                    try {
                        const response = await fetch(imageSource);
                        if (!response.ok) throw new Error('SVG not found');
                        let svgText = await response.text();

                        if (logo.color) {
                            svgText = svgText.replace(/fill="currentColor"/g, `fill="${logo.color}"`);
                            svgText = svgText.replace(/fill="#000"/g, `fill="${logo.color}"`);
                            svgText = svgText.replace(/fill="#000000"/g, `fill="${logo.color}"`);
                        }

                        const svgBlob = new Blob([svgText], { type: 'image/svg+xml;charset=utf-8' });
                        const svgUrl = URL.createObjectURL(svgBlob);

                        const img = new Image();
                        img.onload = () => {
                            const padding = 42;
                            const maxDim = 240 - padding * 2;
                            const scale = Math.min(maxDim / img.width, maxDim / img.height, 1);
                            const drawW = img.width * scale;
                            const drawH = img.height * scale;
                            const dx = (240 - drawW) / 2;
                            const dy = (240 - drawH) / 2;
                            ctx.drawImage(img, dx, dy, drawW, drawH);
                            URL.revokeObjectURL(svgUrl);
                            finalizeLogoSelection(logo, card, canvas.toDataURL('image/png'));
                        };
                        img.onerror = () => {
                            URL.revokeObjectURL(svgUrl);
                            drawInitialsOnCanvas(canvas, ctx, logo);
                            finalizeLogoSelection(logo, card, canvas.toDataURL('image/png'));
                        };
                        img.src = svgUrl;
                    } catch (err) {
                        console.warn('Could not load SVG logo for', logo.name, '- using fallback');
                        drawInitialsOnCanvas(canvas, ctx, logo);
                        finalizeLogoSelection(logo, card, canvas.toDataURL('image/png'));
                    }
                };

                grid.appendChild(card);
            });
        }

        function setupColorPickers() {
            const dotInput = document.getElementById('dot-color-input');
            const dotSwatch = document.getElementById('dot-color-swatch');
            const dotHex = document.getElementById('dot-color-hex');

            const bgInput = document.getElementById('bg-color-input');
            const bgSwatch = document.getElementById('bg-color-swatch');
            const bgHex = document.getElementById('bg-color-hex');

            dotInput.addEventListener('input', () => {
                currentDotColor = dotInput.value;
                dotSwatch.style.backgroundColor = currentDotColor;
                dotHex.textContent = currentDotColor;
                updatePreview(true);
            });

            bgInput.addEventListener('input', () => {
                currentBgColor = bgInput.value;
                bgSwatch.style.backgroundColor = currentBgColor;
                bgHex.textContent = currentBgColor;
                updatePreview(true);
            });

            dotSwatch.style.backgroundColor = currentDotColor;
            dotHex.textContent = currentDotColor;
            bgSwatch.style.backgroundColor = currentBgColor;
            bgHex.textContent = currentBgColor;
        }

        function getCurrentFrame() {
            return frames.find(f => f.id === currentFrameId) || frames[0];
        }

        function getCornerOptions() {
            const style = cornerStyles.find(s => s.id === currentCorners) || cornerStyles[0];
            return {
                cornersSquareOptions: { color: currentDotColor, type: style.square },
                cornersDotOptions: { color: currentDotColor, type: style.dot }
            };
        }

        function initializeQR() {
            const frame = getCurrentFrame();
            const content = document.getElementById('qr-content').value.trim() || "https://x.ai";

            const options = {
                width: frame.qrSize || 240,
                height: frame.qrSize || 240,
                type: "canvas",
                data: content,
                margin: 0,
                qrOptions: { errorCorrectionLevel: "H" },
                dotsOptions: {
                    color: currentDotColor,
                    type: currentPattern
                },
                backgroundOptions: {
                    color: currentBgColor
                },
                ...getCornerOptions()
            };

            const useLogoChecked = document.getElementById('use-logo').checked;

            if (useLogoChecked && logoDataUrl) {
                options.image = logoDataUrl;
                options.imageOptions = {
                    hideBackgroundDots: true,
                    imageSize: 0.28,
                    margin: 6
                };
            }

            if (qrCodeInstance) {
                qrCodeInstance.update(options);
            } else {
                qrCodeInstance = new QRCodeStyling(options);
            }
        }

        async function renderPreview() {
            const frame = getCurrentFrame();
            const cssContainer = document.getElementById('css-frame-container');
            const svgContainer = document.getElementById('svg-frame-container');

            cssContainer.classList.add('hidden');
            svgContainer.classList.add('hidden');
            svgContainer.innerHTML = '';
            document.getElementById('frame-extra').innerHTML = '';

            document.getElementById('current-frame-name').innerHTML = `<span>${frame.name}</span>`;

            if (frame.type === 'css') {
                cssContainer.classList.remove('hidden');
                cssContainer.className = `qr-preview relative mx-auto transition-all ${frame.outerClass}`;
                const inner = document.getElementById('frame-inner');
                inner.className = `flex items-center justify-center transition-all ${frame.innerClass}`;
                document.getElementById('frame-extra').innerHTML = frame.extraHTML || '';

                const qrHost = document.getElementById('qr-host');
                qrHost.innerHTML = '';
                if (qrCodeInstance) qrCodeInstance.append(qrHost);

            } else if (frame.type === 'svg') {
                svgContainer.classList.remove('hidden');
                let qrDataUrl;
                try {
                    const rawData = await qrCodeInstance.getRawData("png");
                    qrDataUrl = URL.createObjectURL(rawData);
                } catch (e) {
                    qrDataUrl = 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==';
                }

                let svgHTML = frame.svgTemplate;

                let qrX = 115, qrY = 62, qrW = 150, qrH = 150;
                if (frame.id === 'wifi-free')         { qrX = 78;  qrY = 148; qrW = 224; qrH = 224; }
                if (frame.id === 'business-card')      { qrX = 205; qrY = 35;  qrW = 135; qrH = 150; }
                if (frame.id === 'shopping-bag-pro')   { qrX = 80;  qrY = 170; qrW = 260; qrH = 260; }

                const qrImageTag = `<image href="${qrDataUrl}" x="${qrX}" y="${qrY}" width="${qrW}" height="${qrH}" preserveAspectRatio="xMidYMid meet"/>`;
                svgHTML = svgHTML.replace(/<rect id="qr-area"[^>]*\/>/, qrImageTag);

                const frameTextValue = document.getElementById('frame-text-input').value.trim() || 'SCAN ME';
                svgHTML = svgHTML.replace(/{{FRAME_TEXT}}/g, frameTextValue);

                svgContainer.innerHTML = svgHTML;

                setTimeout(() => {
                    if (qrDataUrl.startsWith('blob:')) URL.revokeObjectURL(qrDataUrl);
                }, 5000);
            }
        }

        async function updatePreview(force = false) {
            initializeQR();
            await new Promise(r => setTimeout(r, 80));
            await renderPreview();
        }

        function removeLogo() {
            logoDataUrl = null;
            selectedPredefinedLogo = null;
            document.getElementById('logo-preview').classList.add('hidden');
            document.getElementById('logo-file').value = '';
            document.getElementById('use-logo').checked = false;
            document.querySelectorAll('#predefined-logos-grid .logo-card').forEach(c => c.classList.remove('active', 'border-zinc-900'));
            updatePreview(true);
        }

        function setupLogoHandlers() {
            const checkbox = document.getElementById('use-logo');
            const fileInput = document.getElementById('logo-file');
            const previewContainer = document.getElementById('logo-preview');
            const thumb = document.getElementById('logo-thumb');

            checkbox.addEventListener('change', () => {
                if (!checkbox.checked) {
                    if (!selectedPredefinedLogo) {
                        logoDataUrl = null;
                        previewContainer.classList.add('hidden');
                    }
                }
                updatePreview(true);
            });

            fileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (ev) => {
                    logoDataUrl = ev.target.result;
                    selectedPredefinedLogo = null;
                    thumb.src = logoDataUrl;
                    previewContainer.classList.remove('hidden');
                    checkbox.checked = true;
                    document.querySelectorAll('#predefined-logos-grid .logo-card').forEach(c => c.classList.remove('active', 'border-zinc-900'));
                    updatePreview(true);
                };
                reader.readAsDataURL(file);
            });
        }

        function setupContentListener() {
            const input = document.getElementById('qr-content');
            let timeout = null;
            input.addEventListener('input', () => {
                clearTimeout(timeout);
                timeout = setTimeout(() => updatePreview(), 400);
            });

            const frameTextInput = document.getElementById('frame-text-input');
            let frameTextTimeout = null;
            frameTextInput.addEventListener('input', () => {
                clearTimeout(frameTextTimeout);
                frameTextTimeout = setTimeout(() => updatePreview(true), 300);
            });
        }

        function updateFrameTextVisibility() {
            const frame = getCurrentFrame();
            const section = document.getElementById('frame-text-section');
            const hasText = frame.type === 'svg' && frame.svgTemplate && frame.svgTemplate.includes('{{FRAME_TEXT}}');
            section.classList.toggle('hidden', !hasText);
        }

        async function downloadQR() {
            const preview = document.getElementById('preview');
            const frame = getCurrentFrame();
            const scale = frame.type === 'svg' ? 2.2 : 2.8;
            const canvas = await html2canvas(preview, { scale: scale, backgroundColor: "#ffffff" });
            const link = document.createElement('a');
            link.download = `qr-${frame.id}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        async function initializeEverything() {
            initializeTailwind();
            await loadData();

            createFrameCards();
            createPatternCards();
            createCornerCards();
            createLogoTabs();
            renderPredefinedLogos('Todos');
            setupColorPickers();
            setupLogoHandlers();
            setupContentListener();
            updateFrameTextVisibility();

            setTimeout(async () => {
                currentFrameId = 'phone-scan-me';
                document.querySelectorAll('#frame-grid .frame-card').forEach(card => {
                    if (card.textContent.includes('Phone')) card.classList.add('border-zinc-900');
                });
                initializeQR();
                await new Promise(r => setTimeout(r, 120));
                await renderPreview();
            }, 100);

            document.addEventListener('keydown', (e) => {
                if (e.key === "/" && document.activeElement.id !== 'qr-content') {
                    e.preventDefault();
                    document.getElementById('qr-content').focus();
                }
            });
        }

        window.onload = initializeEverything;
    </script>
</body>

</html>
